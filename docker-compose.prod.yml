services:

  # ─────────────────────────────────────────────
  # Traefik – reverse proxy + Let's Encrypt
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      # API / dashboard (internal only – not exposed publicly)
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Global HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

      # Let's Encrypt (ACME)
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      # For testing
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"

      - "--log.level=INFO"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

    networks:
      - proxy

  # ─────────────────────────────────────────────
  # Web (PHP/Apache) – your main application
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      UPLOAD_DIR: ${UPLOAD_DIR}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      - uploads:/shared/uploads
    depends_on:
      - db
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Router: catch everything on the domain EXCEPT /pgadmin
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`) && !PathPrefix(`/pgadmin`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  # ─────────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ─────────────────────────────────────────────
  db:
    build: ./db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    # No public port exposure in production – only reachable inside Docker networks
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - uploads:/shared/uploads
    networks:
      - internal
    command:
      - "postgres"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "min_wal_size=80MB"
      - "-c"
      - "checkpoint_timeout=15min"
      - "-c"
      - "shared_buffers=1GB"

  # ─────────────────────────────────────────────
  # pgAdmin – served at /pgadmin
  # ─────────────────────────────────────────────
  pgadmin:
    build: ./pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      SCRIPT_NAME: /pgadmin

      PGADMIN_CONFIG_AUTHENTICATION_SOURCES: "['oauth2', 'internal']"
      PGADMIN_CONFIG_OAUTH2_AUTO_CREATE_USER: "True"

      PGADMIN_CONFIG_OAUTH2_CONFIG: >-
        [{
          "OAUTH2_NAME": "Keycloak",
          "OAUTH2_DISPLAY_NAME": "Login with Keycloak",
          "OAUTH2_CLIENT_ID": "${KEYCLOAK_CLIENT_ID}",
          "OAUTH2_CLIENT_SECRET": "${KEYCLOAK_CLIENT_SECRET}",
          "OAUTH2_TOKEN_URL": "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token",
          "OAUTH2_AUTHORIZATION_URL": "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth",
          "OAUTH2_API_BASE_URL": "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/",
          "OAUTH2_USERINFO_ENDPOINT": "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo",
          "OAUTH2_SERVER_METADATA_URL": "${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration",
          "OAUTH2_SCOPE": "openid email profile",
          "OAUTH2_USERNAME_CLAIM": "preferred_username",
          "OAUTH2_ADDITIONAL_CLAIMS": {
            "roles": ["admin"]
          }
        }]

      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"

      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PORT_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: "1"

volumes:
  uploads:
  dbdata:
  letsencrypt:
  pgadmin_data:

networks:
  # Shared with Traefik – all internet-facing services join this
  proxy:
    name: proxy
  # DB + backend only – never exposed to Traefik
  internal:
    internal: true
